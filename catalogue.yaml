- name: Doing the Catalogue work
  hosts: catalogue
  become: yes
  tasks:
  - name: disabling the nodeJs
    ansible.builtin.command: dnf module disable nodejs -y
  
  - name: enabling nodeJs
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: Installing nodejs
    ansible.builtin.dnf:
      name: nodejs 
      state: present
    
  - name: Create application user
    ansible.builtin.user:
      name: roboshop
      home: /app
      shell: /sbin/nologin
      system: true
  
  - name: Create a directory if it does not exist
    ansible.builtin.file:
      path: /app 
      state: directory

  - name: Download configuration file
    ansible.builtin.get_url:
      url: "https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip"
      dest: /tmp/catalogue.zip

  - name: Unzipping the code
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

  - name: Install npm packages
    community.general.npm:
      path: /app
      

  - name: Copying the file
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service
      

  - name: Systemctl daemon-reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: Start and enable catalogue
    ansible.builtin.service:
      name: catalogue
      state: started
      enabled: yes
  
  - name: Copy configuration file
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo
    
  - name: Installing the Mongodb client
    ansible.builtin.dnf:
      name: mongodb-mongosh
      state: present

  - name: Loading Masterdata
    ansible.builtin.shell: mongosh --host MONGODB-SERVER-IPADDRESS </app/db/master-data.js

  

  