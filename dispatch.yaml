- name: Configuring Dispatch
  hosts: dispatch
  become: yes
  tasks:
  - name: Installing servers
    ansible.builtin.dnf:
      name: golang 
      state: present

  - name: Create application user
    ansible.builtin.user:
      name: roboshop
      home: /app
      shell: /sbin/nologin
      system: true

  - name: Create a directory if it does not exist
    ansible.builtin.file:
      path: /app 
      state: directory

  - name: Download configuration file
    ansible.builtin.get_url:
      url: "https://roboshop-artifacts.s3.amazonaws.com/dispatch-v3.zip"
      dest: /tmp/dispatch.zip

  - name: Unzipping the code
    ansible.builtin.unarchive:
      src: /tmp/dispatch.zip
      dest: /app
      remote_src: yes


  - name: Download Go dependencies
    ansible.builtin.shell: |
      go mod init dispatch
      go get
      go build
    args:
      chdir: /app

  - name: Copying the file
    ansible.builtin.copy:
      src: dispatch.service
      dest: /etc/systemd/system/dispatch.service

 

  - name: Systemctl daemon-reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: Start and enable dispatch
    ansible.builtin.service:
      name: dispatch
      state: started
      enabled: yes

  
